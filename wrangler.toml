name = "cf-outlook-email"
main = "src/index.ts"
compatibility_date = "2026-06-01"

[assets]
directory = "./public"
binding = "ASSETS"

[[d1_databases]]
binding = "DB"
database_name = "outlook-email-db"
database_id = "64528a3e-6d11-4367-a77b-fe85cb7c9030"
migrations_dir = "migrations"

# Scheduled token refresh. This is just the BASE wake-up rate (every 6h);
# the actual interval / batch / on-off is controlled in 系统设置 at runtime.
# Free plan allows up to 5 cron triggers per account.
[triggers]
crons = ["0 */6 * * *"]
